name: News Digest

on:
  # Scheduled runs disabled to conserve GitHub Actions minutes.
  # schedule:
  #   - cron: "0 0,6,13 * * *" # 7am, 1pm, 8pm GMT+7
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Restore dedup database
        uses: actions/cache@v4
        with:
          path: output/tonghoptin.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: dedup-db-

      - name: Collect articles
        run: python -m tonghoptin.cli collect

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "Update digest $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
